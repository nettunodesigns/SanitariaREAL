<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitaria Croce</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Playfair+Display:ital,wght@1,600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="hero">
        <header class="navbar">
            <div class="logo">
                <img src="sources/Logo_Mamma.svg" alt="Sanitaria Croce Logo">
            </div>
            <nav class="nav-links">
                <a href="#">Homepage</a>
                <a href="#">Prodotti</a>
                <a href="#">Contatti</a>
            </nav>
            <div class="social-icon">
                <a href="https://instagram.com" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-instagram">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <button class="mobile-toggle" aria-label="Toggle Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </header>

        <div class="hero-content">
            <div class="main-title">
                <h1>SANITARIA<br>CROCE</h1>
            </div>

            <div class="subtitle">
                <p class="small-text">di</p>
                <div class="signature">Puccetti Silvia</div>
            </div>
        </div>
    </section>

    <section class="statement-section">
        <div class="statement-container">
            <h2>Articoli Ortopedici e Medicali per migliorare la Terza Et&agrave;</h2>
        </div>
    </section>

    <section class="products-section">
        <div class="product-accordion">
            <div class="accordion-item"
                style="background-image: url('sources/Image_Product_Section/cat_elettromedicali_1772653439952.png');">
                <div class="item-overlay"></div>
                <h3>Prodotti<br>Elettromedicali</h3>
            </div>
            <div class="accordion-item"
                style="background-image: url('sources/Image_Product_Section/cat_ortopedici_1772653426210.png');">
                <div class="item-overlay"></div>
                <h3>Prodotti<br>Ortopedici</h3>
            </div>
            <div class="accordion-item"
                style="background-image: url('sources/Image_Product_Section/cat_ausili_1772653454470.png');">
                <div class="item-overlay"></div>
                <h3>Ausili per<br>Disabili</h3>
            </div>
            <div class="accordion-item"
                style="background-image: url('sources/Image_Product_Section/cat_cuscini_1772653468818.png');">
                <div class="item-overlay"></div>
                <h3>Cuscini</h3>
            </div>
            <div class="accordion-item"
                style="background-image: url('sources/Image_Product_Section/cat_creme_1772653483614.png');">
                <div class="item-overlay"></div>
                <h3>Creme</h3>
            </div>
        </div>
    </section>

    <section class="brands-section">
        <h2 class="brands-caption">Marchi Affiliati con Sanitaria Croce</h2>
        <div class="marquee-container">
            <div class="marquee-content">
                <!-- Fetching actual logos using clearbit -->
                <div class="brand-item"><img src="https://logo.clearbit.com/bauerfeind.com" alt="Bauerfeind"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/ro-ten.it" alt="Ro+ten"
                        onerror="this.src='https://logo.clearbit.com/orthoservice.com'"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/berkemann.com" alt="Berkemann"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/pavis.it" alt="Pavis"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/intermeditalia.it" alt="Intermed"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/newageitalia.it" alt="New Age"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/itechmedicaldivision.com" alt="I-Tech">
                </div>
                <div class="brand-item"><img src="https://logo.clearbit.com/globuscorporation.com" alt="Globus"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/medi-italia.it" alt="Medi"
                        onerror="this.src='https://logo.clearbit.com/medi.de'"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/morettispa.com" alt="Moretti Spa"></div>

                <!-- Duplicated for infinite scroll effect (left to right) -->
                <div class="brand-item"><img src="https://logo.clearbit.com/bauerfeind.com" alt="Bauerfeind"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/ro-ten.it" alt="Ro+ten"
                        onerror="this.src='https://logo.clearbit.com/orthoservice.com'"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/berkemann.com" alt="Berkemann"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/pavis.it" alt="Pavis"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/intermeditalia.it" alt="Intermed"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/newageitalia.it" alt="New Age"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/itechmedicaldivision.com" alt="I-Tech">
                </div>
                <div class="brand-item"><img src="https://logo.clearbit.com/globuscorporation.com" alt="Globus"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/medi-italia.it" alt="Medi"
                        onerror="this.src='https://logo.clearbit.com/medi.de'"></div>
                <div class="brand-item"><img src="https://logo.clearbit.com/morettispa.com" alt="Moretti Spa"></div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileToggle = document.querySelector('.mobile-toggle');
            const navLinks = document.querySelector('.nav-links');

            mobileToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                mobileToggle.classList.toggle('active');
            });
        });
    </script>
</body>

</html>
